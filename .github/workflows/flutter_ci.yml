name: Flutter CI

on:
  push:
    branches: [ main ]

jobs:

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --release

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build ios --release --no-codesign